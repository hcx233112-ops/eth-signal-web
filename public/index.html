<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETH 事件合约信号</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px;
  }
  .title { font-size: 14px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }

  .signal-box {
    width: 200px; height: 200px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all 0.4s ease; margin-bottom: 8px;
  }
  .signal-box.UP   { background: radial-gradient(circle, #0f5c2e, #0a3d1f); border: 3px solid #00e676; box-shadow: 0 0 30px rgba(0,230,118,0.3); }
  .signal-box.DOWN { background: radial-gradient(circle, #5c0f0f, #3d0a0a); border: 3px solid #ff1744; box-shadow: 0 0 30px rgba(255,23,68,0.3); }
  .signal-box.WAIT { background: #111; border: 3px solid #2a2a2a; }
  .signal-box.loading { background: #111; border: 3px solid #222; }
  .signal-label { font-size: 32px; font-weight: 700; }
  .signal-box.UP   .signal-label { color: #00e676; }
  .signal-box.DOWN .signal-label { color: #ff1744; }
  .signal-box.WAIT .signal-label,
  .signal-box.loading .signal-label { color: #444; }
  .signal-score { font-size: 12px; margin-top: 6px; opacity: 0.5; }
  @keyframes flash { 0%,100%{transform:scale(1)} 20%{transform:scale(1.07)} 50%{transform:scale(1)} 70%{transform:scale(1.04)} }
  .signal-box.flash { animation: flash 0.6s ease; }

  .score-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 24px; }
  .score-dot {
    width: 10px; height: 10px; border-radius: 50%;
    transition: background 0.3s;
  }

  .indicators { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; width: 260px; }
  .chip { background: #111; border-radius: 10px; padding: 10px 14px; }
  .chip.up   { border: 1px solid #1a4a2a; }
  .chip.down { border: 1px solid #4a1a1a; }
  .chip.wait { border: 1px solid #1e1e1e; }
  .chip-name   { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .chip-val    { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .chip.up   .chip-val { color: #00e676; }
  .chip.down .chip-val { color: #ff1744; }
  .chip.wait .chip-val { color: #444; }
  .chip-detail { font-size: 10px; color: #333; }

  .stats { display: flex; gap: 32px; margin-bottom: 28px; }
  .stat { text-align: center; }
  .stat-val { font-size: 22px; font-weight: 600; color: #eee; }
  .stat-lbl { font-size: 11px; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  .rsi-bar-wrap { width: 280px; margin-bottom: 28px; }
  .rsi-labels { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 6px; }
  .rsi-bar-bg { height: 6px; background: #1a1a1a; border-radius: 3px; position: relative; }
  .rsi-zone-lo { position: absolute; left: 0; width: 30%; height: 100%; background: rgba(0,230,118,0.15); border-radius: 3px 0 0 3px; }
  .rsi-zone-hi { position: absolute; right: 0; width: 30%; height: 100%; background: rgba(255,23,68,0.15); border-radius: 0 3px 3px 0; }
  .rsi-dot { width: 12px; height: 12px; border-radius: 50%; background: #fff; position: absolute; top: -3px; transform: translateX(-50%); transition: left 0.4s ease; }

  .refresh-row { display: flex; align-items: center; gap: 8px; color: #444; font-size: 13px; }
  .dot-live { width: 7px; height: 7px; border-radius: 50%; background: #00e676; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .update-time { font-size: 11px; color: #3a3a3a; margin-top: 6px; }
  .error { color: #ff5555; font-size: 13px; text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<div class="title">ETH · 事件合约信号</div>

<div class="signal-box loading" id="mainBox">
  <div class="signal-label" id="mainLabel">--</div>
  <div class="signal-score" id="mainScore">加载中</div>
</div>

<div class="score-bar" id="scorebar"></div>

<div class="indicators">
  <div class="chip wait" id="chip-rsi">
    <div class="chip-name">RSI (14)</div>
    <div class="chip-val" id="chip-rsi-val">--</div>
    <div class="chip-detail" id="chip-rsi-detail">--</div>
  </div>
  <div class="chip wait" id="chip-macd">
    <div class="chip-name">MACD</div>
    <div class="chip-val" id="chip-macd-val">--</div>
    <div class="chip-detail" id="chip-macd-detail">--</div>
  </div>
  <div class="chip wait" id="chip-ema">
    <div class="chip-name">EMA 5 / 20</div>
    <div class="chip-val" id="chip-ema-val">--</div>
    <div class="chip-detail" id="chip-ema-detail">--</div>
  </div>
  <div class="chip wait" id="chip-bb">
    <div class="chip-name">布林带 (20)</div>
    <div class="chip-val" id="chip-bb-val">--</div>
    <div class="chip-detail" id="chip-bb-detail">--</div>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-val" id="price">--</div>
    <div class="stat-lbl">ETH 价格</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="rsi">--</div>
    <div class="stat-lbl">RSI(14)</div>
  </div>
</div>

<div class="rsi-bar-wrap">
  <div class="rsi-labels">
    <span style="color:#00e676">◀ &lt;30</span>
    <span>RSI</span>
    <span style="color:#ff1744">&gt;70 ▶</span>
  </div>
  <div class="rsi-bar-bg">
    <div class="rsi-zone-lo"></div>
    <div class="rsi-zone-hi"></div>
    <div class="rsi-dot" id="dot" style="left:50%"></div>
  </div>
</div>

<div class="refresh-row">
  <div class="dot-live"></div>
  <span id="countdown">加载中...</span>
</div>
<div class="update-time" id="uptime"></div>
<div class="error" id="err"></div>

<script>
const INTERVAL = 15;
let timer = INTERVAL, lastSig = null;

function voteLabel(v) { return v === 1 ? '买涨 ↑' : v === -1 ? '买跌 ↓' : '观望'; }
function voteClass(v) { return v === 1 ? 'up' : v === -1 ? 'down' : 'wait'; }

function setChip(id, vote, detail) {
  document.getElementById('chip-' + id).className = 'chip ' + voteClass(vote);
  document.getElementById('chip-' + id + '-val').textContent = voteLabel(vote);
  document.getElementById('chip-' + id + '-detail').textContent = detail;
}

function renderScoreBar(votes) {
  const bar = document.getElementById('scorebar');
  bar.innerHTML = '';
  Object.values(votes).forEach(v => {
    const d = document.createElement('div');
    d.className = 'score-dot';
    d.style.background = v === 1 ? '#00e676' : v === -1 ? '#ff1744' : '#2a2a2a';
    bar.appendChild(d);
  });
}

async function load() {
  try {
    document.getElementById('err').textContent = '';
    const r = await fetch('/api/signal');
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    const { comp } = d;
    const box = document.getElementById('mainBox');

    if (lastSig !== null && lastSig !== comp.signal) {
      box.classList.remove('flash');
      void box.offsetWidth;
      box.classList.add('flash');
      setTimeout(() => box.classList.remove('flash'), 700);
      fetch(`/api/notify?signal=${comp.signal}&price=${d.price}&rsi=${d.rsi}&level=${encodeURIComponent('综合')}`);
    }
    lastSig = comp.signal;

    box.className = 'signal-box ' + comp.signal;
    document.getElementById('mainLabel').textContent = comp.label;

    const up   = Object.values(comp.votes).filter(v => v === 1).length;
    const down = Object.values(comp.votes).filter(v => v === -1).length;
    document.getElementById('mainScore').textContent = `↑${up}  ↓${down}  (4项指标)`;

    renderScoreBar(comp.votes);

    setChip('rsi',  comp.votes.rsi,  comp.details.rsi);
    setChip('macd', comp.votes.macd, comp.details.macdHist > 0 ? `柱+${comp.details.macdHist}` : `柱${comp.details.macdHist}`);
    setChip('ema',  comp.votes.ema,  comp.details.emaDir);
    setChip('bb',   comp.votes.bb,   comp.details.bbPos);

    document.getElementById('price').textContent = '$' + d.price.toLocaleString();
    document.getElementById('rsi').textContent = d.rsi;
    document.getElementById('dot').style.left = d.rsi + '%';
    document.getElementById('uptime').textContent = '更新于 ' + new Date(d.time).toLocaleTimeString('zh-CN');
    timer = INTERVAL;
  } catch(e) {
    document.getElementById('err').textContent = '获取失败: ' + e.message;
  }
}

function tick() {
  timer--;
  if (timer <= 0) { load(); timer = INTERVAL; }
  document.getElementById('countdown').textContent = `${timer} 秒后刷新`;
}

load();
setInterval(tick, 1000);
</script>
</body>
</html>
