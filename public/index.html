<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETH 事件合约信号</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px;
  }
  .title { font-size: 14px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
  .signals { display: flex; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
  .card { display: flex; flex-direction: column; align-items: center; }
  .card-tag { font-size: 11px; color: #555; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
  .signal-box {
    width: 200px; height: 200px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all 0.4s ease;
  }
  .signal-box.UP   { background: radial-gradient(circle, #0f5c2e, #0a3d1f); border: 3px solid #00e676; box-shadow: 0 0 30px rgba(0,230,118,0.3); }
  .signal-box.DOWN { background: radial-gradient(circle, #5c0f0f, #3d0a0a); border: 3px solid #ff1744; box-shadow: 0 0 30px rgba(255,23,68,0.3); }
  .signal-box.WAIT { background: #111; border: 3px solid #2a2a2a; }
  .signal-box.loading { background: #111; border: 3px solid #222; }
  .signal-label { font-size: 32px; font-weight: 700; }
  .signal-box.UP   .signal-label { color: #00e676; }
  .signal-box.DOWN .signal-label { color: #ff1744; }
  .signal-box.WAIT .signal-label, .signal-box.loading .signal-label { color: #444; }
  .signal-sub { font-size: 11px; margin-top: 6px; opacity: 0.5; text-align: center; padding: 0 12px; }
  .winrate { font-size: 12px; margin-top: 8px; color: #555; }
  .stats { display: flex; gap: 32px; margin-bottom: 28px; }
  .stat { text-align: center; }
  .stat-val { font-size: 22px; font-weight: 600; color: #eee; }
  .stat-lbl { font-size: 11px; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .rsi-bar-wrap { width: 280px; margin-bottom: 28px; }
  .rsi-labels { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 6px; }
  .rsi-bar-bg { height: 6px; background: #1a1a1a; border-radius: 3px; position: relative; }
  .rsi-zone-lo { position: absolute; left: 0; width: 25%; height: 100%; background: rgba(0,230,118,0.15); border-radius: 3px 0 0 3px; }
  .rsi-zone-hi { position: absolute; right: 0; width: 25%; height: 100%; background: rgba(255,23,68,0.15); border-radius: 0 3px 3px 0; }
  .rsi-line-30 { position: absolute; left: 30%; width: 1px; height: 100%; background: #333; }
  .rsi-line-70 { position: absolute; left: 70%; width: 1px; height: 100%; background: #333; }
  .rsi-dot { width: 12px; height: 12px; border-radius: 50%; background: #fff; position: absolute; top: -3px; transform: translateX(-50%); transition: left 0.4s ease; }
  .refresh-row { display: flex; align-items: center; gap: 8px; color: #444; font-size: 13px; }
  .dot-live { width: 7px; height: 7px; border-radius: 50%; background: #00e676; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes flash { 0%,100%{transform:scale(1)} 20%{transform:scale(1.07)} 50%{transform:scale(1)} 70%{transform:scale(1.04)} }
  .signal-box.flash { animation: flash 0.6s ease; }
  .update-time { font-size: 11px; color: #3a3a3a; margin-top: 6px; }
  .error { color: #ff5555; font-size: 13px; text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<div class="title">ETH · 事件合约信号</div>

<div class="signals">
  <div class="card">
    <div class="card-tag">RSI 25/75 · 高精度</div>
    <div class="signal-box loading" id="box1">
      <div class="signal-label" id="label1">--</div>
      <div class="signal-sub" id="sub1">加载中...</div>
    </div>
    <div class="winrate">胜率 56.4% · ~40次/天</div>
  </div>
  <div class="card">
    <div class="card-tag">RSI 30/70 · 高频率</div>
    <div class="signal-box loading" id="box2">
      <div class="signal-label" id="label2">--</div>
      <div class="signal-sub" id="sub2">加载中...</div>
    </div>
    <div class="winrate">胜率 56.0% · ~115次/天</div>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-val" id="price">--</div>
    <div class="stat-lbl">ETH 价格</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="rsi">--</div>
    <div class="stat-lbl">RSI(14)</div>
  </div>
</div>

<div class="rsi-bar-wrap">
  <div class="rsi-labels">
    <span style="color:#00e676">◀ &lt;25</span>
    <span>30 ── 70</span>
    <span style="color:#ff1744">&gt;75 ▶</span>
  </div>
  <div class="rsi-bar-bg">
    <div class="rsi-zone-lo"></div>
    <div class="rsi-zone-hi"></div>
    <div class="rsi-line-30"></div>
    <div class="rsi-line-70"></div>
    <div class="rsi-dot" id="dot" style="left:50%"></div>
  </div>
</div>

<div class="refresh-row">
  <div class="dot-live"></div>
  <span id="countdown">加载中...</span>
</div>
<div class="update-time" id="uptime"></div>
<div class="error" id="err"></div>

<script>
const INTERVAL = 15;
let timer = INTERVAL, last1 = null, last2 = null;

function applySignal(boxId, labelId, subId, s, last, price, rsi, level) {
  const box = document.getElementById(boxId);
  if (last !== null && last !== s.signal && s.signal !== 'WAIT') {
    box.classList.remove('flash');
    void box.offsetWidth;
    box.classList.add('flash');
    setTimeout(() => box.classList.remove('flash'), 700);
    fetch(`/api/notify?signal=${s.signal}&price=${price}&rsi=${rsi}&level=${encodeURIComponent(level)}`);
  }
  box.className = 'signal-box ' + s.signal;
  document.getElementById(labelId).textContent = s.label;
  document.getElementById(subId).textContent =
    s.signal === 'UP'   ? '预测10分钟后上涨' :
    s.signal === 'DOWN' ? '预测10分钟后下跌' : '暂无信号';
}

async function load() {
  try {
    document.getElementById('err').textContent = '';
    const r = await fetch('/api/signal');
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    applySignal('box1', 'label1', 'sub1', d.s1, last1, d.price, d.rsi, 'RSI25/75');
    last1 = d.s1.signal;
    applySignal('box2', 'label2', 'sub2', d.s2, last2, d.price, d.rsi, 'RSI30/70');
    last2 = d.s2.signal;

    document.getElementById('price').textContent = '$' + d.price.toLocaleString();
    document.getElementById('rsi').textContent = d.rsi;
    document.getElementById('dot').style.left = d.rsi + '%';
    document.getElementById('uptime').textContent = '更新于 ' + new Date(d.time).toLocaleTimeString('zh-CN');
    timer = INTERVAL;
  } catch(e) {
    document.getElementById('err').textContent = '获取失败: ' + e.message;
  }
}

function tick() {
  timer--;
  if (timer <= 0) { load(); timer = INTERVAL; }
  document.getElementById('countdown').textContent = `${timer} 秒后刷新`;
}

load();
setInterval(tick, 1000);
</script>
</body>
</html>
